<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Medical Report Analyzer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>AI-Based Medical Report Analyzer</h1>

    <p>
        Upload your medical report and get an AI-powered analysis with an easy-to-understand summary.
    </p>

    <input type="file" id="reportFile">

    <br><br>

    <button onclick="analyzeReport()">
        Analyze Report
    </button>

    <div id="result">
        <h3>Analysis Result</h3>
        <p>Your report summary will appear here.</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
